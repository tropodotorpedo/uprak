<!DOCTYPE html>
<html>
<head>
<title>my image site</title>
<style>
body {
  font-family: Arial;
}

.top {
  border-bottom: 1px solid black;
  padding: 10px;
}

.container {
  display: flex;
}

.left {
  width: 150px;
  border-right: 1px solid black;
  padding: 5px;
}

.right {
  padding: 10px;
  display: flex;
  flex-wrap: wrap;
  width: 540px;
}

img {
  width: 150px;
}

.box {
  border: 1px solid black;
  margin: 5px;
  padding: 5px;
  width: 150px;
}

.tag {
  cursor: pointer;
}

.preview {
  margin-top: 10px;
}
</style>
</head>
<body>

<div class="top">

<input type="file" id="fileInput" onchange="previewImage()">

<div class="preview">
  <img id="previewImg">
  <br>
  <input type="text" id="title" placeholder="title"><br>
  <input type="text" id="author" placeholder="author"><br>
  <input type="text" id="tags" placeholder="tags"><br>
  <button onclick="upload()">upload</button>
</div>

<br>

<input type="text" id="search" placeholder="search">
<button onclick="searchImages()">search</button>
<button onclick="loadGallery()">reset</button>

</div>

<div class="container">

<div class="left">
<b>tags</b>
<div id="tagList"></div>
</div>

<div class="right" id="gallery"></div>

</div>

<script>
var images = JSON.parse(localStorage.getItem('images') || '[]');

function previewImage() {
  var file = document.getElementById('fileInput').files[0];
  var reader = new FileReader();

  reader.onload = function(e) {
    document.getElementById('previewImg').src = e.target.result;
  };

  if (file) {
    reader.readAsDataURL(file);
  }
}

function upload() {
  var file = document.getElementById('fileInput').files[0];
  var title = document.getElementById('title').value;
  var author = document.getElementById('author').value;
  var tags = document.getElementById('tags').value.split(',');

  if (!file) {
    alert('no file');
    return;
  }

  var reader = new FileReader();
  reader.onload = function(e) {
    images.push({
      src: e.target.result,
      title: title,
      author: author,
      tags: tags
    });

    localStorage.setItem('images', JSON.stringify(images));
    loadGallery();
    updateTags();
  };

  reader.readAsDataURL(file);
}

function loadGallery(data) {
  var gallery = document.getElementById('gallery');
  gallery.innerHTML = '';

  if (!data) data = images;

  for (var i = 0; i < data.length; i++) {
    var img = data[i];

    var div = document.createElement('div');
    div.className = 'box';

    div.innerHTML = "<img src='" + img.src + "'><br>" +
                    "title: " + (img.title || '') + "<br>" +
                    "author: " + img.author + "<br>" +
                    "tags: " + img.tags;

    gallery.appendChild(div);
  }
}

function searchImages() {
  var q = document.getElementById('search').value;
  var result = [];

  for (var i = 0; i < images.length; i++) {
    var img = images[i];

    for (var j = 0; j < img.tags.length; j++) {
      if (img.tags[j].includes(q)) {
        result.push(img);
        break;
      }
    }
  }

  loadGallery(result);
}

function updateTags() {
  var tagList = document.getElementById('tagList');
  tagList.innerHTML = '';

  var allTags = [];

  for (var i = 0; i < images.length; i++) {
    for (var j = 0; j < images[i].tags.length; j++) {
      if (!allTags.includes(images[i].tags[j])) {
        allTags.push(images[i].tags[j]);
      }
    }
  }

  for (var i = 0; i < allTags.length; i++) {
    var t = document.createElement('div');
    t.className = 'tag';
    t.innerText = allTags[i];

    t.onclick = function() {
      var clicked = this.innerText;
      var result = [];

      for (var k = 0; k < images.length; k++) {
        if (images[k].tags.includes(clicked)) {
          result.push(images[k]);
        }
      }

      loadGallery(result);
    };

    tagList.appendChild(t);
  }
}

loadGallery();
updateTags();

</script>

</body>
</html>
